<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Konekta | Dashboard</title>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo-box">
                <img src="logo.png" alt="Konekta"> <h2>KONEKTA</h2>
            </div>
            <nav>
                <ul>
                    <li>Dashboard</li>
                    <li>Meus Produtos</li>
                    <li>Vendas</li>
                    <li>Afiliados</li>
                </ul>
            </nav>
        </aside>

        <main class="content">
            <header>
                <h1>Visão Geral</h1>
            </header>
            
            <section class="stats">
                <div class="card"><h3>Vendas</h3><p>R$ 76,50</p></div>
                <div class="card"><h3>Alunos</h3><p>45</p></div>
                <div class="card"><h3>Afiliados</h3><p>12</p></div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
